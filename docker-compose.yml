# ── Docker Compose: Local Development Stack ──────────────────────────────
# Orchestrates FastAPI app and PostgreSQL for local dev.
# Redis is provided by Upstash (cloud).
#
# Usage:
#   docker compose up -d          → start all services
#   docker compose logs -f app    → tail the app logs
#   docker compose down -v        → stop + remove volumes
#
# Architecture:
#   Client → FastAPI (8000) → PostgreSQL (5432) + Upstash Redis (cloud)

services:
  # ── PostgreSQL Database ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventory_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory_pass}
      POSTGRES_DB: smart_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d smart_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inviq_network

  # ── FastAPI Application ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database — connects to the 'db' service above
      DATABASE_URL: postgresql://${POSTGRES_USER:-inventory_user}:${POSTGRES_PASSWORD:-inventory_pass}@db:5432/smart_inventory
      ENVIRONMENT: production

      # Redis — connects to Upstash Redis (cloud)
      REDIS_URL: ${REDIS_URL:-}

      # Security — CHANGE THESE for production!
      SECRET_KEY: ${SECRET_KEY:-change-me-generate-with-openssl-rand-hex-32}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@inventory.local}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}

      # AI Keys (optional — provide via .env or host env)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - inviq_network

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  inviq_network:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:

